name: Build Pydantic Core for Termux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # These versions refer to the target Termux Python environment
        python-version: ["3.10", "3.11", "3.12","3.13"]
    
    steps:
      - name: Checkout Pydantic Core
        uses: actions/checkout@v4
        with:
          repository: pydantic/pydantic-core
          fetch-depth: 0

      - name: Build Wheels for Termux
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-linux-android
          # FIX: We remove the "-i pythonX.Y" which was causing the lookup error.
          # We use --compatibility off because manylinux isn't relevant for Android.
          args: --release --out dist --compatibility off
          # Optional: Use a specific maturin version for stability
          maturin-version: v1.5.1
        
      - name: Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: pydantic-core-termux-py${{ matrix.python-version }}
          path: dist/*.whl
