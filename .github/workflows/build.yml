name: Build Pydantic Core for Termux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Pydantic Core
        uses: actions/checkout@v4
        with:
          repository: pydantic/pydantic-core
          fetch-depth: 0

      - name: Build Wheel
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-linux-android
          maturin-version: latest
          # We use --sdist to package the source and build a universal ABI3 wheel
          # This avoids the "missing _sysconfigdata" error
          args: --release --out dist --compatibility off
        env:
          # This forces a generic ABI3 build compatible with 3.10 - 3.13
          PYO3_CROSS_PYTHON_VERSION: 3.10

      - name: Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: pydantic-core-termux
          path: dist/*.whl
