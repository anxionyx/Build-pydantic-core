name: Build Pydantic Core for Termux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Building for each version ensures specific compatibility
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    
    steps:
      - name: Checkout Pydantic Core
        uses: actions/checkout@v4
        with:
          repository: pydantic/pydantic-core
          fetch-depth: 0

      - name: Build Wheels for Termux
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-linux-android
          # "latest" ensures we support the new [project] metadata in pyproject.toml
          maturin-version: latest
          # --compatibility off is required because 'manylinux' doesn't exist on Android
          args: --release --out dist --compatibility off
        env:
          # This tells the cross-compiler which Python version to target 
          # without looking for a local python3.x binary
          PYO3_CROSS_PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: pydantic-core-termux-py${{ matrix.python-version }}
          path: dist/*.whl
