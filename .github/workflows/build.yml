name: Build Pydantic Core for Termux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Pydantic-core uses ABI3 for 3.8+, so one build can often cover many,
        # but building for specific targets ensures 3.13 support.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    
    steps:
      - name: Checkout Pydantic Core
        uses: actions/checkout@v4
        with:
          repository: pydantic/pydantic-core
          fetch-depth: 0

      - name: Build Wheels for Termux
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-linux-android
          # maturin v1.7.4+ supports the new license-files TOML format
          maturin-version: v1.7.4
          # --compatibility off is crucial for Android targets
          args: --release --out dist --compatibility off
        env:
          # Tells Maturin to build for the specific Python version without 
          # needing the local python3.13 binary present on the runner.
          PYO3_CROSS_PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: pydantic-core-termux-py${{ matrix.python-version }}
          path: dist/*.whl
